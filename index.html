<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il mio Pokédex</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Il mio Pokedex Web</h1>

    <!-- Barra di ricerca-->
    <div class="searchSection">
        <div class="innerSearchSection">
            <input type="text" id="searchInput" placeholder="Cerca un Pokémon...">
            <button id="searchBtn">Cerca</button>
        </div>
        <button id="generateRandomBtn">Random Pokémon!</button>
        <div class="innerSearchSection">
            <input type="text" id="searchInputByType" placeholder="Cerca per tipo...">
            <button id="searchTypeBtn">Cerca</button>
        </div>
        <button id="loadFirstPokemon">Load 10 first Pokémon</button>
    </div>

    <!-- Scheda risultato -->
    <div id="card" class="pokemon-card hidden">
        <button id="favBtn" class="fav-btn">☆</button>
        <img id="sprite" src="" alt="Sprite">
        <h2 id="pokeName"></h2>
        <p id="pokeType"></p>
    </div>

    <div id="statsSection" class="hidden">
        <div class="section-title">Statistiche Base</div>
        <div class="stats-list">
            <div class="stat-row">
                <div class="stat-name">HP</div>
                <div class="stat-bar-wrap">
                    <div class="stat-bar-fill" style="width:calc(48/255*100%)"></div>
                </div>
                <div class="stat-num">0</div>
            </div>
            <div class="stat-row">
                <div class="stat-name">Attacco</div>
                <div class="stat-bar-wrap">
                    <div class="stat-bar-fill" style="width:calc(48/255*100%)"></div>
                </div>
                <div class="stat-num">0</div>
            </div>
            <div class="stat-row">
                <div class="stat-name">Difesa</div>
                <div class="stat-bar-wrap">
                    <div class="stat-bar-fill" style="width:calc(48/255*100%)"></div>
                </div>
                <div class="stat-num">0</div>
            </div>
            <div class="stat-row">
                <div class="stat-name">Att. Speciale</div>
                <div class="stat-bar-wrap">
                    <div class="stat-bar-fill" style="width:calc(48/255*100%)"></div>
                </div>
                <div class="stat-num">0</div>
            </div>
            <div class="stat-row">
                <div class="stat-name">Dif. Speciale</div>
                <div class="stat-bar-wrap">
                    <div class="stat-bar-fill" style="width:calc(48/255*100%)"></div>
                </div>
                <div class="stat-num">0</div>
            </div>
            <div class="stat-row">
                <div class="stat-name">Velocità</div>
                <div class="stat-bar-wrap">
                    <div class="stat-bar-fill" style="width:calc(48/255*100%)"></div>
                </div>
                <div class="stat-num">0</div>
            </div>
        </div>
    </div>

    <h3 id="tipoTitolo" class="tipo-titolo"></h3>
    <div class="tipo-layout">
        <ul id="listaPokemon" class="lista-nomi hidden"></ul>
        <div id="risultatiTipo" class="risultati-tipo"></div>
    </div>

    <div id="preferitiSection">
        <h2>I miei preferiti</h2>
        <div id="preferitiLista"></div>
    </div>

    <script src="main.js"></script>
</body>

</html>
